services:

  # Servidor web Apache + PHP (reemplaza XAMPP)
  web:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"             # Tu app en http://localhost:8080
    volumes:
      - .:/var/www/html       # Cambios en vivo sin reconstruir
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

  # Base de datos MySQL (reemplaza MySQL de XAMPP)
  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT_HOST:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d   # Carga los .sql en orden numérico
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Gestor visual de BD (reemplaza phpMyAdmin)
  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"           # Gestor de BD en http://localhost:8081
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
